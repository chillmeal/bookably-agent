services:
  redis:
    image: redis:7-alpine
    container_name: bookably-agent-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: bookably-agent-acp-postgres
    profiles: ["acp"]
    environment:
      POSTGRES_DB: acp
      POSTGRES_USER: acp
      POSTGRES_PASSWORD: acp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acp -d acp"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - acp_pg_data:/var/lib/postgresql/data

  acp-migrate:
    image: postgres:16-alpine
    container_name: bookably-agent-acp-migrate
    profiles: ["acp"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../ACP-release-work/db/migrations:/migrations:ro
    command:
      - /bin/sh
      - -c
      - |
        set -e
        for f in /migrations/*.sql; do
          psql "postgres://acp:acp@postgres:5432/acp?sslmode=disable" -v ON_ERROR_STOP=1 -f "$$f"
        done

  acp:
    image: golang:1.22
    container_name: bookably-agent-acp
    profiles: ["acp"]
    working_dir: /src/backend
    depends_on:
      postgres:
        condition: service_healthy
      acp-migrate:
        condition: service_completed_successfully
    volumes:
      - ../ACP-release-work:/src
    environment:
      ACP_HTTP_ADDR: ":8080"
      ACP_API_KEY: local-acp-key
      ACP_DATABASE_DSN: postgres://acp:acp@postgres:5432/acp?sslmode=disable
      ACP_TON_EXECUTOR_MODE: mock
      ACP_TON_LITE_CONFIG_URL: https://ton.org/testnet-global.config.json
      ACP_TON_EXPLORER_TX_BASE_URL: https://testnet.tonscan.org/tx
    ports:
      - "8181:8080"
    command: ["/bin/sh", "-c", "go run ./cmd/acp-server"]

volumes:
  acp_pg_data:
